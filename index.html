<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Impostor Game</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <h1>Impostor</h1>

  <div id="setup">
    <h2>Players</h2>
    <textarea id="playerNames" placeholder="One name per line"></textarea>

    <h2>Categories</h2>
    <div id="categoryToggles"></div>

    <button id="startBtn">Start Game</button>
  </div>

  <div id="reveal" class="hidden">
    <h2 id="playerLabel"></h2>

    <div id="card" class="card">
      <p id="cardText">Hold to reveal</p>
    </div>

    <button id="nextBtn">Next Player</button>
  </div>

  <script type="module" src="game.js"></script>
</body>
</html>
