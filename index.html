<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Impostor Game</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <h1>Impostor</h1>

  <div id="setup">

    <h2>Players</h2>
    <div id="playerList"></div>
    <input id="nameInput" placeholder="Add player..." />
    <button id="addPlayerBtn">Add</button>

    <h2>Categories</h2>
    <div id="categoryList"></div>

    <button id="startBtn">Start Game</button>
  </div>

  <div id="reveal" class="hidden">
    <h2 id="playerLabel"></h2>

    <div id="card" class="card">
      <p id="cardWord">Hold to reveal</p>
      <p id="cardHint" class="hint"></p>
    </div>

    <button id="nextBtn">Next Player</button>
